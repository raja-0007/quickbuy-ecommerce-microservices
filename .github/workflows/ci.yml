name: CI Pipeline

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # Frontend
      - name: Install Frontend
        run: |
          cd apps/web
          npm install
          
      - name: Build Frontend
        run: |
          cd apps/web
          npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      # Backend Services
      - name: Build Services
        run: |
          for dir in services/*; do
            echo "Processing $dir"
            cd $dir
            npm install
            npm run build || echo "No build script"
            cd ../..
          done

      - name: Check JS Syntax
        run: |
          for dir in services/*; do
            echo "Checking syntax in $dir"
            find $dir -name "*.js" -exec node -c {} \;
            cd ../..
          done